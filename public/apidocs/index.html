<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Convex API Docs</title>
<link rel="canonical" href="https://docs.convex.world/apidocs/">
<meta http-equiv="refresh" content="0; url=https://docs.convex.world/apidocs/">
<script>
// Preserve deep-link path, query, and hash on redirect.
(function () {
  var rawPath = window.location.pathname;
  var suffix = rawPath.replace(/^\/+apidocs\/?/i, "");
  var target =
    "https://docs.convex.world/apidocs/" +
    suffix +
    window.location.search +
    window.location.hash;
  window.location.replace(target);
})();
</script>
<meta name="robots" content="noindex">
</head>
<body>
<p>The Convex API documentation has moved to
<a href="https://docs.convex.world/apidocs/">docs.convex.world/apidocs/</a>.</p>
</body>
</html>
